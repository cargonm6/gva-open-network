<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>ONetMap</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <!-- ===================== -->
    <!-- BARRA SUPERIOR -->
    <!-- ===================== -->
    <div id="topbar">
        <img id="logo-img" src="img/logo.svg"><b id="logo">ONetMap</b>

        <button data-action="new">
            <img src="img/buttons/menu/new.svg" class="btn-icon">
            Nueva hoja
        </button>

        <div class="dropdown">
            <button class="dropbtn">
                <img src="img/buttons/menu/floppy.svg" class="btn-icon">
                Exportar ▾
            </button>

            <div class="dropdown-content">

                <button data-action="export-json">
                    <img src="img/buttons/menu/json.svg" class="btn-icon">
                    <span>Texto JSON</span>
                </button>

                <button data-action="export-gzip">
                    <img src="img/buttons/menu/zip.svg" class="btn-icon">
                    <span>Comprimido GZIP</span>
                </button>

                <button data-action="export-png">
                    <img src="img/buttons/menu/picture.svg" class="btn-icon">
                    <span>Imagen PNG</span>
                </button>

            </div>
        </div>

        <button data-action="import">
            <img src="img/buttons/menu/folder.svg" class="btn-icon">
            Cargar archivo
        </button>

        <button data-action="help">
            <img src="img/buttons/menu/help.svg" class="btn-icon">
            Ayuda
        </button>

        <input type="file" id="importFile" accept=".json,.gz,.gzip" style="display:none;">
    </div>

    <!-- ===================== -->
    <!-- CONTENEDOR PRINCIPAL -->
    <!-- ===================== -->
    <div id="container">

        <!-- ===================== -->
        <!-- TOOLBAR IZQUIERDA -->
        <!-- ===================== -->
        <div id="toolbar">

            <h5>Dispositivos</h5>

            <div class="dropdown toolbar-dropdown">
                <button class="tool-btn dropbtn">
                    <img src="img/devices/symbol/router.svg" class="btn-icon">Intermedios ▾
                </button>
                <div class="dropdown-content">
                    <button data-action="tool" data-tool="router">
                        <img src="img/devices/symbol/router.svg" class="btn-icon">Router
                    </button>
                    <button data-action="tool" data-tool="switch">
                        <img src="img/devices/symbol/switch.svg" class="btn-icon">Switch
                    </button>
                    <button data-action="tool" data-tool="ap">
                        <img src="img/devices/symbol/ap.svg" class="btn-icon">Punto de acceso
                    </button>
                </div>
            </div>

            <div class="dropdown toolbar-dropdown">
                <button class="tool-btn dropbtn">
                    <img src="img/devices/symbol/pc.svg" class="btn-icon">Terminales ▾
                </button>
                <div class="dropdown-content">
                    <button data-action="tool" data-tool="pc">
                        <img src="img/devices/symbol/pc.svg" class="btn-icon">PC
                    </button>
                    <button data-action="tool" data-tool="screen">
                        <img src="img/devices/symbol/screen.svg" class="btn-icon">Pantalla
                    </button>
                </div>
            </div>

            <div class="dropdown toolbar-dropdown">
                <button class="tool-btn dropbtn">
                    <img src="img/devices/symbol/patch.svg" class="btn-icon">Estructura ▾
                </button>
                <div class="dropdown-content">
                    <button data-action="tool" data-tool="patch">
                        <img src="img/devices/symbol/patch.svg" class="btn-icon">Patch panel
                    </button>
                    <button data-action="tool" data-tool="cloud">
                        <img src="img/devices/symbol/cloud.svg" class="btn-icon">Nube
                    </button>
                </div>
            </div>

            <h5>Relaciones</h5>

            <div class="dropdown toolbar-dropdown">
                <button class="tool-btn dropbtn">
                    <img src="img/buttons/link/cable.svg" class="btn-icon">
                    Enlace ▾
                </button>
                <div class="dropdown-content">
                    <button data-action="tool" data-tool="link-wired">
                        <img src="img/buttons/link/cable.svg" class="btn-icon">Ethernet
                    </button>
                    <button data-action="tool" data-tool="link-wireless">
                        <img src="img/buttons/link/wireless.svg" class="btn-icon">Inalámbrico
                    </button>
                    <button data-action="tool" data-tool="link-wan">
                        <img src="img/buttons/link/wan.svg" class="btn-icon">WAN
                    </button>
                </div>
            </div>

            <button class="tool-btn" data-action="tool" data-tool="area">
                <img src="img/buttons/link/area.svg" class="btn-icon">Área
            </button>

            <h5>Herramientas</h5>

            <button class="tool-btn active" id="selectButton" data-action="tool" data-tool="select">
                <img src="img/buttons/tools/cursor.svg" class="btn-icon">Selección
            </button>

            <button class="tool-btn" data-action="tool" data-tool="text">
                <img src="img/buttons/tools/text.svg" class="btn-icon">Texto
            </button>

            <button class="tool-btn" id="deleteButton" data-action="tool" data-tool="delete">
                <img src="img/buttons/tools/delete.svg" class="btn-icon">Eliminar
            </button>

            <h5>Vista</h5>

            <div class="dropdown toolbar-dropdown">
                <button class="tool-btn dropbtn">
                    <img id="iconSetPreview" src="img/devices/symbol/router.svg" class="btn-icon">
                    <span id="iconSetLabel">Simbólica</span> ▾
                </button>

                <div class="dropdown-content">

                    <button onclick="changeIconSet('symbol', 'Simbólica')">
                        <img src="img/devices/symbol/router.svg">
                        <span>Simbólica</span>
                    </button>

                    <button onclick="changeIconSet('real', 'Realista')">
                        <img src="img/devices/real/router.svg">
                        <span>Realista</span>
                    </button>

                </div>
            </div>

            <p>Zoom: <span id="zoomLabel">100%</span></p>
            <input id="zoomSlider" type="range" min="0" max="1" step="0.01" value="0.5">

        </div>

        <!-- ===================== -->
        <!-- CANVAS -->
        <!-- ===================== -->
        <canvas id="canvas"></canvas>

        <!-- ===================== -->
        <!-- INSPECTOR -->
        <!-- ===================== -->
        <div id="inspector">
            <h3>Propiedades</h3>
            <div id="props"></div>
        </div>

    </div>

    <textarea id="textEditor"></textarea>

    <!-- ===================== -->
    <!-- SCRIPT -->
    <!-- ===================== -->
    <script src="js/app.js"></script>

</body>

</html>
