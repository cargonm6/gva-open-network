<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>RED CENTRO</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Barra superior -->
    <div id="topbar">
        <b id="logo">RED CENTRO</b>

        <!-- NUEVA HOJA -->
        <button onclick="clearAll()">
            <img src="img/tools/new.svg" class="btn-icon">
            Nueva hoja
        </button>

        <!-- EXPORTAR DROPDOWN -->
        <div class="dropdown">
            <button class="dropbtn">
                <img src="img/tools/floppy.svg" class="btn-icon">
                Exportar ▾
            </button>

            <div class="dropdown-content">

                <button onclick="exportJSON()">
                    <img src="img/tools/json.svg" class="btn-icon">
                    <span>Texto JSON</span>
                </button>

                <button onclick="exportGZIP()">
                    <img src="img/tools/zip.svg" class="btn-icon">
                    <span>Comprimido GZIP</span>
                </button>

                <button onclick="exportPNG()">
                    <img src="img/tools/picture.svg" class="btn-icon">
                    <span>Imagen PNG</span>
                </button>

            </div>
        </div>

        <!-- IMPORTAR (UN SOLO BOTÓN) -->
        <button onclick="triggerImport()">
            <img src="img/tools/folder.svg" class="btn-icon">
            Cargar archivo
        </button>

        <input type="file" id="importFile" accept=".json,.gz,.gzip" style="display:none;">
    </div>

    <!-- CONTENEDOR PRINCIPAL -->
    <div id="container">

        <!-- TOOLBAR IZQUIERDA -->
        <div id="toolbar">

            <h5>Dispositivos</h5>

            <button class="tool-btn" data-label="Router" onclick="toggleTool('router', this)">
                <img src="img/devices/router.svg" class="btn-icon">&nbsp;Router
            </button>

            <button class="tool-btn" data-label="Switch" onclick="toggleTool('switch', this)">
                <img src="img/devices/switch.svg" class="btn-icon">&nbsp;Switch
            </button>

            <button class="tool-btn" data-label="PC" onclick="toggleTool('pc', this)">
                <img src="img/devices/pc.svg" class="btn-icon">&nbsp;PC
            </button>

            <button class="tool-btn" data-label="Patch" onclick="toggleTool('patch', this)">
                <img src="img/devices/patch.svg" class="btn-icon">&nbsp;Patch panel
            </button>

            <h5>Relaciones</h5>

            <button class="tool-btn" onclick="toggleTool('link', this)">
                <img src="img/tools/cable.svg" class="btn-icon">&nbsp;Enlace
            </button>

            <button class="tool-btn" onclick="toggleTool('area', this)">
                <img src="img/tools/area.svg" class="btn-icon">&nbsp;Área
            </button>

            <h5>Herramientas</h5>

            <button onclick="clearTool()">
                <img src="img/tools/cursor.svg" class="btn-icon">&nbsp;Selección
            </button>

            <button class="tool-btn" onclick="toggleTool('text', this)">
                <img src="img/tools/text.svg" class="btn-icon">&nbsp;Texto
            </button>

            <button class="tool-btn" onclick="toggleTool('delete', this)">
                <img src="img/tools/delete.svg" class="btn-icon">&nbsp;Eliminar
            </button>

        </div>

        <!-- CANVAS CENTRAL -->
        <canvas id="canvas" width="900" height="600"></canvas>

        <!-- INSPECTOR DERECHA -->
        <div id="inspector">
            <h3>Propiedades</h3>
            <div id="props"></div>
        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
