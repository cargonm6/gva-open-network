<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>ONetMap</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- ===================== -->
    <!-- BARRA SUPERIOR -->
    <!-- ===================== -->
    <div id="topbar">
        <img id="logo-img" src="img/logo.svg"><b id="logo">ONetMap</b>

        <button data-action="new">
            <img src="img/tools/new.svg" class="btn-icon">
            Nueva hoja
        </button>

        <div class="dropdown">
            <button class="dropbtn">
                <img src="img/tools/floppy.svg" class="btn-icon">
                Exportar ▾
            </button>

            <div class="dropdown-content">

                <button data-action="export-json">
                    <img src="img/tools/json.svg" class="btn-icon">
                    <span>Texto JSON</span>
                </button>

                <button data-action="export-gzip">
                    <img src="img/tools/zip.svg" class="btn-icon">
                    <span>Comprimido GZIP</span>
                </button>

                <button data-action="export-png">
                    <img src="img/tools/picture.svg" class="btn-icon">
                    <span>Imagen PNG</span>
                </button>

            </div>
        </div>

        <button data-action="import">
            <img src="img/tools/folder.svg" class="btn-icon">
            Cargar archivo
        </button>

        <button data-action="help">
            <img src="img/tools/help.svg" class="btn-icon">
            Ayuda
        </button>

        <input type="file" id="importFile" accept=".json,.gz,.gzip" style="display:none;">
    </div>

    <!-- ===================== -->
    <!-- CONTENEDOR PRINCIPAL -->
    <!-- ===================== -->
    <div id="container">

        <!-- ===================== -->
        <!-- TOOLBAR IZQUIERDA -->
        <!-- ===================== -->
        <div id="toolbar">

            <h5>Dispositivos</h5>

            <button class="tool-btn" data-action="tool" data-tool="router">
                <img src="img/devices/router.svg" class="btn-icon">&nbsp;Router
            </button>

            <button class="tool-btn" data-action="tool" data-tool="switch">
                <img src="img/devices/switch.svg" class="btn-icon">&nbsp;Switch
            </button>

            <button class="tool-btn" data-action="tool" data-tool="pc">
                <img src="img/devices/pc.svg" class="btn-icon">&nbsp;PC
            </button>

            <button class="tool-btn" data-action="tool" data-tool="patch">
                <img src="img/devices/patch.svg" class="btn-icon">&nbsp;Patch panel
            </button>

            <h5>Relaciones</h5>

            <button class="tool-btn" data-action="tool" data-tool="link">
                <img src="img/tools/cable.svg" class="btn-icon">&nbsp;Enlace
            </button>

            <button class="tool-btn" data-action="tool" data-tool="area">
                <img src="img/tools/area.svg" class="btn-icon">&nbsp;Área
            </button>

            <h5>Herramientas</h5>

            <button class="tool-btn active" id="selectButton"
                    data-action="tool" data-tool="select">
                <img src="img/tools/cursor.svg" class="btn-icon">&nbsp;Selección
            </button>

            <button class="tool-btn" data-action="tool" data-tool="text">
                <img src="img/tools/text.svg" class="btn-icon">&nbsp;Texto
            </button>

            <button class="tool-btn" id="deleteButton"
                    data-action="tool" data-tool="delete">
                <img src="img/tools/delete.svg" class="btn-icon">&nbsp;Eliminar
            </button>

            <h5>Zoom</h5>

            <input id="zoomSlider" type="range" min="0.5" max="2" step="0.01" value="1">

        </div>

        <!-- ===================== -->
        <!-- CANVAS -->
        <!-- ===================== -->
        <canvas id="canvas"></canvas>

        <!-- ===================== -->
        <!-- INSPECTOR -->
        <!-- ===================== -->
        <div id="inspector">
            <h3>Propiedades</h3>
            <div id="props"></div>
        </div>

    </div>

    <!-- ===================== -->
    <!-- SCRIPT -->
    <!-- ===================== -->
    <script src="app.js"></script>

</body>

</html>
