<template id="tpl-image">
  <fieldset>
    <legend>Identificación</legend>
    <table class="inspector-table">
      <tr>
        <td>ID:</td>
        <td><input data-bind="id" disabled /></td>
      </tr>

      <tr>
        <td>Tipo:</td>
        <td><span data-bind="type"></span></td>
      </tr>
    </table>
  </fieldset>

  <br>

  <fieldset>
    <legend>Posición</legend>
    <table class="inspector-table">
      <tr>
        <td>X:</td>
        <td data-bind="x"></td>
      </tr>
      <tr>
        <td>Y:</td>
        <td data-bind="y"></td>
      </tr>
    </table>
  </fieldset>

  <br>

  <fieldset>
    <legend>Imagen</legend>
    <table class="inspector-table">
      <tr>
        <td>Opacidad:</td>
        <td class="opacity-cell">
          <input type="range" min="10" max="100" step="10" data-bind="opacitySlider" />
          <span class="inline" data-bind="opacityValue" style="margin-left:8px;"></span>
        </td>
      </tr>
    </table>
  </fieldset>

  <br>

  <div class="inspector-actions">
    <button data-action="saveAll">Guardar</button>
  </div>

  <span data-bind="error" class="inspector-error"></span>
</template>
